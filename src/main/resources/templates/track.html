<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking Pesanan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/shared.css}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .track-container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .info-panel {
            background: rgba(250,250,250,0.05);
            padding: 2rem;
            border: 2px solid var(--border);
            height: fit-content;
        }

        .info-panel h1 {
            margin-top: 0;
            color: var(--fg);
            border-bottom: 2px solid var(--accent);
            padding-bottom: 1rem;
            font-size: 1.8rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            border: 2px solid var(--border);
            color: var(--fg);
        }

        .status-active { border-color: #4ade80; color: #4ade80; }
        .status-pending { border-color: #facc15; color: #facc15; }
        .status-completed { border-color: var(--accent); color: var(--accent); }

        .info-group {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .info-group:last-child { border-bottom: none; }

        .info-label {
            font-size: 0.75rem;
            color: var(--muted-fg);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
        }

        .info-value {
            font-size: 1rem;
            color: var(--fg);
            font-weight: 500;
            word-break: break-word;
        }

        .map-wrapper {
            background: rgba(250,250,250,0.05);
            border: 2px solid var(--border);
            overflow: hidden;
        }

        #trackingMap {
            width: 100%;
            height: 600px;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--muted-fg);
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: rgba(222,49,99,0.15);
            color: var(--accent);
            padding: 1rem;
            border: 2px solid var(--accent);
            margin-bottom: 1rem;
        }

        .driver-info {
            background: rgba(250,250,250,0.02);
            padding: 1rem;
            border-left: 4px solid var(--accent);
        }

        @media (max-width: 1024px) {
            .track-container {
                grid-template-columns: 1fr;
            }

            #trackingMap {
                height: 400px;
            }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="site-nav" role="navigation" aria-label="Main navigation">
    <a class="nav-brand" href="/">Go<span>Aja</span></a>
    <ul class="nav-links" id="navLinks" role="list">
        <li><a href="/">Beranda</a></li>
        <li th:if="${currentRole == 'DRIVER' or currentRole == 'ADMIN'}">
            <a href="/orders">Pesanan</a>
        </li>
        <li th:if="${currentRole == 'ADMIN'}"><a href="/drivers">Driver</a></li>
        <li th:if="${currentRole == 'ADMIN'}"><a href="/layanan">Layanan</a></li>
        <li th:if="${currentRole == 'USER'}"><a href="/driver/apply">Gabung jadi Driver</a></li>
    </ul>
    <div class="nav-right">
        <span class="nav-user" sec:authentication="name">User</span>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn-logout">Keluar</button>
        </form>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
    </div>
</nav>

<!-- MAIN CONTENT -->
<section class="track-container" aria-label="Tracking pesanan">
    <!-- Info Panel -->
    <div class="info-panel">
        <h1>🚗 Pelacakan</h1>
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Memuat data pesanan...</p>
            </div>
        </div>
    </div>

    <!-- Map -->
    <div class="map-wrapper">
        <div id="trackingMap"></div>
    </div>
</section>

<!-- FOOTER -->
<footer class="site-footer">
    <div class="footer-inner">
        <div class="footer-brand">Go<span>Aja</span></div>
        <p class="footer-copy">&copy; 2025 GoAja &mdash; UAS Pemrograman Berorientasi Objek</p>
    </div>
</footer>

<!-- Library -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Nav toggle
    document.getElementById('navToggle').addEventListener('click', function() {
        const nl = document.getElementById('navLinks');
        const open = nl.classList.toggle('open');
        this.setAttribute('aria-expanded', open);
    });

    const orderId = /*[[${orderId}]]*/ 0;
    const config = {
        map: null,
        markers: {
            pickup: null,
            destination: null,
            driver: null
        },
        polyline: null,
        routePolyline: null
    };

    function initializeMap() {
        config.map = L.map('trackingMap').setView([-6.2088, 106.8456], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap',
            maxZoom: 19
        }).addTo(config.map);
    }

    function updateMarker(type, lat, lng) {
        if (!lat || !lng) return;

        if (config.markers[type]) {
            config.map.removeLayer(config.markers[type]);
        }

        let color, label, icon;
        if (type === 'pickup') {
            color = '#10b981';
            label = 'A';
            icon = '📍';
        } else if (type === 'destination') {
            color = '#DE3163';
            label = 'B';
            icon = '📌';
        } else {
            color = '#3b82f6';
            label = '🚗';
            icon = '🚗';
        }

        config.markers[type] = L.circleMarker([lat, lng], {
            radius: 8,
            fillColor: color,
            color: '#fff',
            weight: 2,
            opacity: 1,
            fillOpacity: 0.7
        }).addTo(config.map);

        L.marker([lat, lng], {
            icon: L.divIcon({
                className: 'text-label',
                html: `<div style="font-size: 24px;">${icon}</div>`
            })
        }).addTo(config.map);
    }

    function drawRoute(pickupLat, pickupLng, destLat, destLng) {
        if (config.routePolyline) {
            config.map.removeLayer(config.routePolyline);
        }

        config.routePolyline = L.polyline([
            [pickupLat, pickupLng],
            [destLat, destLng]
        ], {
            color: '#DE3163',
            weight: 3,
            opacity: 0.5,
            dashArray: '5, 5'
        }).addTo(config.map);
    }

    async function fetchTrackingData() {
        try {
            const response = await fetch(`/api/orders/${orderId}/track`);
            if (!response.ok) throw new Error('Gagal mengambil data');

            const data = await response.json();
            updateUI(data);
        } catch (error) {
            document.getElementById('content').innerHTML =
                `<div class="error">⚠️ ${error.message}</div>`;
            console.error(error);
        }
    }

    function updateUI(data) {
        const statusClass = {
            'PENDING': 'status-pending',
            'DIJEMPUT': 'status-active',
            'SELESAI': 'status-completed'
        }[data.status] || 'status-pending';

        document.getElementById('content').innerHTML = `
            <div class="status-badge ${statusClass}">${data.status || 'Tidak diketahui'}</div>

            <div class="info-group driver-info">
                <div class="info-label">📍 Lokasi Driver</div>
                <div class="info-value">${data.driverLat?.toFixed(6)}, ${data.driverLng?.toFixed(6)}</div>
            </div>

            <div class="info-group">
                <div class="info-label">⏱️ ETA</div>
                <div class="info-value">${data.etaMinutes ? data.etaMinutes + ' menit' : '—'}</div>
            </div>

            <div class="info-group">
                <div class="info-label">🔢 ID Pesanan</div>
                <div class="info-value">#${data.orderId}</div>
            </div>
        `;

        // Update peta (jika data lokasi tersedia)
        if (data.driverLat && data.driverLng) {
            updateMarker('driver', data.driverLat, data.driverLng);
        }
    }

    function startTracking() {
        initializeMap();
        fetchTrackingData();
        setInterval(fetchTrackingData, 3000);
    }

    // Fetch order details untuk mendapat lokasi pickup & destination
    async function loadOrderDetails() {
        try {
            const response = await fetch(`/api/orders/${orderId}`);
            if (response.ok) {
                const order = await response.json();
                if (order.lokasiJemputLat && order.lokasiTujuanLat) {
                    updateMarker('pickup', order.lokasiJemputLat, order.lokasiJemputLng);
                    updateMarker('destination', order.lokasiTujuanLat, order.lokasiTujuanLng);
                    drawRoute(order.lokasiJemputLat, order.lokasiJemputLng,
                             order.lokasiTujuanLat, order.lokasiTujuanLng);

                    const bounds = L.latLngBounds([
                        [order.lokasiJemputLat, order.lokasiJemputLng],
                        [order.lokasiTujuanLat, order.lokasiTujuanLng],
                        [order.driverLat || order.lokasiJemputLat, order.driverLng || order.lokasiJemputLng]
                    ]);
                    config.map.fitBounds(bounds, { padding: [50, 50] });
                }
            }
        } catch (e) {
            console.error('Error loading order details:', e);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        startTracking();
        loadOrderDetails();
    });
</script>

</body>
</html>
